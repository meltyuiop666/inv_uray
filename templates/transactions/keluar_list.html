{% extends 'base.html' %}

{% block title %}Barang Keluar - Lookatstore.id Inventory{% endblock %}
{% block header_title %}Riwayat Barang Keluar{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Action and Filter Bar -->
    <div class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            
            <!-- Filters Form -->
            <form class="flex-1 grid grid-cols-1 sm:grid-cols-3 gap-4" hx-get="{% url 'transactions:keluar_list' %}" hx-target="#keluar-table" hx-trigger="submit">
                <!-- Search Text -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </span>
                    <input type="text" name="q" id="keluar-search-input" value="{{ query }}"
                           hx-get="{% url 'transactions:keluar_list' %}"
                           hx-trigger="keyup changed delay:300ms, search"
                           hx-target="#keluar-table"
                           hx-include="#keluar-start-date, #keluar-end-date"
                           class="block w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-100 transition-all text-sm"
                           placeholder="Cari produk atau alasan...">
                </div>

                <!-- Start Date -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i data-lucide="calendar" class="w-4 h-4"></i>
                    </span>
                    <input type="date" name="start_date" id="keluar-start-date" value="{{ start_date }}"
                           hx-get="{% url 'transactions:keluar_list' %}"
                           hx-trigger="change"
                           hx-target="#keluar-table"
                           hx-include="#keluar-search-input, #keluar-end-date"
                           class="block w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-100 transition-all text-sm">
                </div>

                <!-- End Date -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i data-lucide="calendar" class="w-4 h-4"></i>
                    </span>
                    <input type="date" name="end_date" id="keluar-end-date" value="{{ end_date }}"
                           hx-get="{% url 'transactions:keluar_list' %}"
                           hx-trigger="change"
                           hx-target="#keluar-table"
                           hx-include="#keluar-search-input, #keluar-start-date"
                           class="block w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-100 transition-all text-sm">
                </div>
            </form>
            
            <!-- Create Button -->
            <div class="flex-shrink-0 flex space-x-2">
                <button onclick="window.print()" class="px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-sm rounded-xl transition-all cursor-pointer flex items-center">
                    <i data-lucide="printer" class="w-4 h-4 mr-2"></i>
                    Cetak
                </button>
                <button hx-get="{% url 'transactions:keluar_create' %}"
                        hx-target="#modal-container"
                        class="px-4 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-semibold text-sm rounded-xl shadow-md shadow-brand-600/10 hover:shadow-brand-600/20 active:scale-[0.98] transition-all cursor-pointer flex items-center">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
                    Catat Barang Keluar
                </button>
            </div>
            
        </div>
    </div>

    <!-- Live Data Table Card -->
    <div class="bg-white border border-slate-100 rounded-3xl shadow-sm overflow-hidden" 
         id="keluar-table"
         hx-get="{% url 'transactions:keluar_list' %}"
         hx-trigger="keluarListChanged from:body"
         hx-include="#keluar-search-input, #keluar-start-date, #keluar-end-date">
        {% include 'transactions/keluar_table_fragment.html' %}
    </div>
</div>

<script>
    document.body.addEventListener('keluarListChanged', function() {
        closeModal();
    });
</script>
{% endblock %}
