{% load static %}
<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Lookatstore.id Inventory</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            200: '#fecdd3',
                            300: '#fda4af',
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                            700: '#be123c',
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito Sans', 'sans-serif'],
                        display: ['Rubik', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full flex items-center justify-center p-6 font-sans relative bg-cover bg-center bg-no-repeat" style="background-image: url('https://lh3.googleusercontent.com/gps-cs-s/APNQkAHjgh5WGEJt6UCS3yzAkV-OdKvcL05fKBAdPjS6Ua2RSIIsxX0YNVgMZ9JTXlC7M-WC5FJ2SL-EvIHNPBkrk9AiLbpe4l2rDRJzwvQE3-P6xCaV0YQG82Ltt2Ag6Vx4LI8uSJ8uLBVNSYn3=s680-w680-h510-rw');">
    
    <!-- Overlay gelap -->
    <div class="absolute inset-0 bg-black/55 backdrop-blur-sm"></div>
    
    <div class="w-full max-w-md relative z-10">
        <!-- Brand identity -->
        <div class="text-center mb-8">
            <div class="mb-4 flex justify-center">
                <img src="{% static 'images/logo.jpg' %}" alt="Lookatstore.id" class="h-20 w-auto">
            </div>
            <p class="mt-2 text-sm text-slate-500">Sistem Informasi Persediaan Barang UMKM Lookatstore.id</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-white border border-slate-100 shadow-xl rounded-3xl p-8">
            <h3 class="font-display font-semibold text-lg text-slate-900 mb-6">Masuk ke Akun Admin</h3>
            
            {% if messages %}
                <div class="mb-6 space-y-2">
                    {% for message in messages %}
                        <div class="flex items-center p-4 text-sm text-rose-800 bg-rose-50 border border-rose-100 rounded-2xl">
                            <i data-lucide="alert-circle" class="w-5 h-5 mr-3 text-rose-500 shrink-0"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
            
            <form action="{% url 'accounts:login' %}" method="post" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </span>
                        <input type="text" name="username" id="username" required
                            class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-100 transition-all text-sm"
                            placeholder="Masukkan username admin">
                    </div>
                </div>
                
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        <input type="password" name="password" id="password" required
                            class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-brand-500 focus:ring-4 focus:ring-brand-100 transition-all text-sm"
                            placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="w-full flex justify-center items-center py-3.5 px-4 bg-brand-600 hover:bg-brand-700 text-white font-semibold text-sm rounded-2xl shadow-lg shadow-brand-600/10 hover:shadow-brand-600/20 active:scale-[0.98] transition-all cursor-pointer">
                    Masuk Sekarang
                    <i data-lucide="arrow-right" class="w-5 h-5 ml-2"></i>
                </button>
            </form>
        </div>
        
        <p class="mt-8 text-center text-xs text-slate-400">
            Skripsi &copy; Uray Rizky Juniar (221103859) — STMIK Pontianak
        </p>
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
